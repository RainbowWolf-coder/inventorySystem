<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="inventoryDashboard.css">

</head>
<body>

<div class="container py-4">
<h2 class="mb-4"><i class="bi bi-box-seam me-2"></i>Inventory Dashboard</h2>

<div id="stockAlertsBanner" class="alert alert-danger d-none mb-3" role="alert"></div>

<div class="row g-3 mb-4">
<div class="col-md-3"><div class="card card-kpi p-3 text-center"><h6>รายการทั้งหมด</h6><h3 id="totalItems">0</h3></div></div>
<div class="col-md-3"><div class="card card-kpi p-3 text-center"><h6>ใกล้หมด</h6><h3 class="text-warning" id="lowItems">0</h3></div></div>
<div class="col-md-3"><div class="card card-kpi p-3 text-center"><h6>หมด</h6><h3 class="text-danger" id="outItems">0</h3></div></div>
<div class="col-md-3"><div class="card card-kpi p-3 text-center"><h6>รวมสต็อก</h6><h3 id="sumStock">0</h3></div></div>
</div>

<div class="row g-3 mb-4">
<div class="col-md-8">
<div class="card p-3">
<h6><i class="bi bi-bar-chart-line me-2"></i>รายการที่ถูกเบิกบ่อย</h6>
<canvas id="topChart"></canvas>
</div>
</div>
<div class="col-md-4">
<div class="card p-3">
<h6><i class="bi bi-clock-history me-2"></i>ประวัติการเบิกล่าสุด (วันนี้)</h6>
<div class="history-box" id="history"></div>
</div>
</div>
</div>

<div class="card p-3 mb-3" style="border-radius:14px;">
<div class="row g-2 align-items-center">
<div class="col-md-8">
<input class="form-control" id="search" placeholder="ค้นหารายการ...">
</div>
<div class="col-md-4">
	<div class="dashboard-actions">
		<button class="btn btn-success px-4" style="border-radius:10px;" onclick="createItemFromDashboard()"><i class="bi bi-plus-square me-2"></i>เพิ่มรายการ</button>
		<button class="btn btn-outline-danger px-4" style="border-radius:10px;" onclick="deleteItemFromDashboard()"><i class="bi bi-trash me-2"></i>ลบรายการ</button>
		<button class="btn btn-primary px-4" style="border-radius:10px;" onclick="refreshDashboard()" id="btnRefreshDashboard"><i class="bi bi-arrow-clockwise me-2"></i>อัปเดตข้อมูล</button>
		<button class="btn btn-danger px-4" style="border-radius:10px;" onclick="exportPDF()"><i class="bi bi-file-earmark-pdf me-2"></i>Export PDF</button>
	</div>
</div>
</div>
<div class="mt-2 small text-muted">ระบบจะสรุปรายงานสต็อกและส่งไฟล์ PDF ทางอีเมลอัตโนมัติทุกสิ้นเดือน</div>
</div>

<div class="card p-3">
<div class="table-responsive inventory-table-box">
<table class="table table-hover" id="inventoryTable">
<thead>
<tr><th>รายการ</th><th class="text-end">คงเหลือ</th><th>หน่วย</th><th>สถานะ</th><th class="text-end">ปรับสต็อก</th></tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<script src="inventoryDashboard.js"></script>


</body>
</html>
